<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Modern Workout Tracker</title>
<style>
:root{--bg-color:#0a0a0a;--surface-color:#1a1a1a;--text-main:#ffffff;--text-muted:#888888;--c-blue:#3b82f6;--c-green:#22c55e;--c-orange:#f97316;--c-purple:#a855f7;--c-red:#ef4444;--c-pink:#ec4899;--c-yellow:#eab308;--c-teal:#14b8a6;--c-cyan:#06b6d4;--sidebar-width:300px}
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent}body{background-color:var(--bg-color);color:var(--text-main);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hamburger{position:absolute;top:20px;left:20px;z-index:1000;background:rgba(0,0,0,0.5);border:none;cursor:pointer;padding:10px;border-radius:8px}.hamburger div{width:25px;height:2px;background-color:var(--text-main);margin:5px 0;transition:.3s}
.sidebar{position:fixed;top:0;left:calc(-1 * var(--sidebar-width));width:var(--sidebar-width);height:100%;background:var(--surface-color);z-index:999;transition:left .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:5px 0 15px rgba(0,0,0,0.5)}.sidebar.open{left:0}
.sidebar-header{padding:75px 20px 20px 20px;border-bottom:1px solid #333;display:flex;gap:10px}.tab-btn{flex:1;padding:10px;background:transparent;border:1px solid #444;color:var(--text-muted);border-radius:8px;cursor:pointer;font-size:.8rem}.tab-btn.active{background:var(--c-blue);color:#fff;border-color:var(--c-blue)}
.sidebar-content{flex:1;overflow-y:auto;padding:20px}details.settings-panel{background:#111;padding:15px;border-radius:12px;margin-bottom:20px;border:1px solid #222}details.settings-panel>summary{font-size:.75rem;text-transform:uppercase;color:var(--text-muted);letter-spacing:1px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;outline:none}
details.settings-panel>summary::-webkit-details-marker{display:none}details.settings-panel>summary::after{content:"▼";font-size:.8em}details.settings-panel[open]>summary::after{content:"▲"}.settings-content{margin-top:15px}.setting-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.85rem}
.setting-row select,.setting-row input[type="number"],.setting-row input[type="range"]{width:70px;background:#222;border:1px solid #444;color:#fff;padding:4px 8px;border-radius:4px;text-align:center}.ex-item{background:#222;padding:12px;border-radius:8px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;border-left:4px solid var(--c-green)}
.ex-info{flex:1}.ex-info div{font-size:.8rem;color:var(--text-muted)}.ex-actions{display:flex;gap:5px}.ex-actions button{background:none;border:none;color:var(--text-muted);padding:5px;cursor:pointer;font-size:1.1rem;border-radius:4px;transition:.2s}.ex-actions button:active{background:#444}.add-btn-style{width:100%;padding:12px;background:#333;border:1px dashed #555;color:#fff;border-radius:8px;margin-bottom:20px;cursor:pointer}
.form-group{margin-bottom:15px}.form-group label{display:block;font-size:.8rem;color:var(--text-muted);margin-bottom:5px}.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px;background:#111;border:1px solid #444;color:#fff;border-radius:6px;font-family:inherit}.form-group textarea{resize:vertical;min-height:100px}.form-group input[type="checkbox"]{width:auto;margin-right:8px;vertical-align:middle}
details.history-item{background:#222;border-left:3px solid var(--c-purple);margin-bottom:10px;border-radius:4px;overflow:hidden}details.history-item>summary{padding:12px;cursor:pointer;font-weight:bold;font-size:.85rem;list-style:none;outline:none}details.history-item>summary::-webkit-details-marker{display:none}details.history-item>summary:active{background:#333}.history-content{padding:0 12px 12px 12px;font-size:.75rem;color:var(--text-muted)}
.history-content pre{white-space:pre-wrap;font-family:inherit;margin-bottom:10px}.history-actions{display:flex;gap:8px;margin-top:10px;border-top:1px solid #333;padding-top:10px}.history-actions button{flex:1;background:#333;color:#fff;border:none;padding:6px;border-radius:4px;cursor:pointer}.top-bar{padding:8dvh 5vw 2dvh 5vw;text-align:center;font-size:4vw;color:var(--text-muted);letter-spacing:1px}@media(min-width:768px){.top-bar{font-size:1rem}}
.top-bar #total-time{color:var(--text-main);font-weight:bold;font-family:'Courier New',Courier,monospace;font-size:3rem}.center-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2dvh 5vw;gap:3dvh}.circle-btn{width:80vw;max-width:350px;aspect-ratio:1/1;border-radius:50%;background-color:var(--surface-color);border:1.5vw solid var(--c-blue);box-shadow:0 0 40px rgba(59,130,246,0.1);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s ease;outline:none;color:var(--text-main);position:relative}
@media(min-width:768px){.circle-btn{border-width:10px}}.circle-btn:active{transform:scale(0.96)}.circle-btn.color-blue{border-color:var(--c-blue);box-shadow:0 0 50px rgba(59,130,246,0.2)}.circle-btn.color-green{border-color:var(--c-green);box-shadow:0 0 50px rgba(34,197,94,0.2)}.circle-btn.color-orange{border-color:var(--c-orange);box-shadow:0 0 50px rgba(249,115,22,0.2)}.circle-btn.color-purple{border-color:var(--c-purple);box-shadow:0 0 50px rgba(168,85,247,0.2)}
.circle-btn.color-red{border-color:var(--c-red);box-shadow:0 0 50px rgba(239,68,68,0.2)}.circle-btn.color-pink{border-color:var(--c-pink);box-shadow:0 0 50px rgba(236,72,153,0.2)}.circle-btn.color-yellow{border-color:var(--c-yellow);box-shadow:0 0 50px rgba(234,179,8,0.2)}.circle-btn.color-teal{border-color:var(--c-teal);box-shadow:0 0 50px rgba(20,184,166,0.2)}.circle-btn.color-cyan{border-color:var(--c-cyan);box-shadow:0 0 50px rgba(6,182,212,0.2)}
#item-title{font-size:8vw;font-weight:700;text-align:center;padding:0 5vw;margin-bottom:1dvh}#item-subtitle{font-size:4vw;color:var(--text-muted);margin-bottom:2dvh}#item-time{font-size:16vw;font-weight:800;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1}@media(min-width:768px){#item-title{font-size:2.2rem}#item-subtitle{font-size:1rem}#item-time{font-size:5rem}}
.controls-container{display:flex;justify-content:center;gap:20px}.control-btn{width:50px;height:50px;border-radius:50%;background-color:#1a1a1a;border:2px solid #333;color:var(--text-muted);font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s ease;outline:none}.control-btn:active{transform:scale(0.9);background-color:#222}.control-btn.paused{background-color:var(--c-orange);border-color:var(--c-orange);color:#000}
.bottom-bar{padding:3dvh 5vw 4dvh 5vw;text-align:center;background:linear-gradient(to top,#000 0%,transparent 100%);display:flex;flex-direction:column;justify-content:center;min-height:12dvh}#next-immediate{color:var(--text-main);font-weight:700;font-size:6.5vw;margin-bottom:6px}#next-upcoming{color:var(--text-muted);font-size:4.5vw}@media(min-width:768px){.top-bar #total-time{font-size:3.5rem}#next-immediate{font-size:1.8rem}#next-upcoming{font-size:1.2rem}}
#summary-screen{position:absolute;top:0;left:0;right:0;bottom:0;background-color:var(--bg-color);display:none;flex-direction:column;padding:5dvh 5vw;z-index:10;overflow-y:auto}#summary-screen h2{text-align:center;margin:2dvh 0;color:var(--c-purple);font-size:6vw}textarea{flex:1;background:var(--surface-color);border:1px solid #333;color:var(--text-main);border-radius:12px;padding:15px;font-family:monospace;font-size:.9rem;resize:none;margin-bottom:20px;line-height:1.5;min-height:250px}
.action-btn{background-color:var(--c-blue);color:#fff;border:none;padding:16px;border-radius:12px;font-size:1rem;font-weight:bold;cursor:pointer;margin-bottom:10px}.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:998;display:none}.overlay.open{display:block}.switch{position:relative;display:inline-block;width:40px;height:20px}.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#444;transition:.4s;border-radius:20px}.slider:before{position:absolute;content:"";height:16px;width:16px;left:2px;bottom:2px;background-color:#fff;transition:.4s;border-radius:50%}input:checked+.slider{background-color:var(--c-blue)}input:checked+.slider:before{transform:translateX(20px)}
.custom-modal-wrap{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px}.custom-modal-wrap.open{display:flex}.custom-modal-content{background:var(--surface-color);border:1px solid #333;border-radius:12px;padding:20px;width:100%;max-width:400px;box-shadow:0 10px 40px rgba(0,0,0,0.8)}.custom-modal-content h3{margin-bottom:15px;font-size:1.2rem}
.custom-modal-body{margin-bottom:20px;font-size:.9rem;color:#ccc}.custom-modal-actions{display:flex;gap:10px;justify-content:flex-end}.custom-modal-actions button{padding:10px 15px;border:none;border-radius:6px;cursor:pointer;font-weight:bold}.btn-cancel{background:#333;color:#fff}.btn-confirm{background:var(--c-blue);color:#fff}.btn-danger{background:#dc2626;color:#fff}
</style></head>
<body>
<button class="hamburger" onclick="toggleSidebar()"><div></div><div></div><div></div></button><div class="overlay" id="overlay" onclick="toggleSidebar()"></div><div class="custom-modal-wrap" id="custom-modal"><div class="custom-modal-content"><h3 id="modal-title">Title</h3><div class="custom-modal-body" id="modal-body"></div><div class="custom-modal-actions" id="modal-actions"><button class="btn-cancel" id="modal-cancel">Cancel</button><button class="btn-confirm" id="modal-confirm">Confirm</button></div></div></div>
<div class="sidebar" id="sidebar"><div id="profile-container" style="position:absolute;top:15px;left:65px;z-index:1000;"></div><div class="sidebar-header" style="padding-top:85px"><button class="tab-btn active" id="tab-hist" onclick="switchTab('history')">History</button><button class="tab-btn" id="tab-ex" onclick="switchTab('exercise')">Routine</button></div><div class="sidebar-content" id="sidebar-content"></div></div>
<div id="workout-ui" style="display:flex;flex-direction:column;height:100dvh;"><div class="top-bar">TOTAL ELAPSED TIME <br><span id="total-time">00:00</span></div><div class="center-stage"><button id="main-btn" class="circle-btn color-blue"><div id="item-title">READY</div><div id="item-subtitle">Tap to start workout</div><div id="item-time">GO</div></button><div class="controls-container"><button class="control-btn" id="btn-pause" onclick="togglePause()" title="Pause/Resume">⏸</button><button class="control-btn" id="btn-skip" onclick="skipStep()" title="Skip Step">⏭</button><button class="control-btn" id="btn-end" onclick="finishWorkout(true)" title="End Session">⏹</button></div></div><div class="bottom-bar"><div id="next-immediate">Loading...</div><div id="next-upcoming"></div></div></div>
<div id="summary-screen"><h2>Session Report</h2><textarea id="summary-text" readonly></textarea><button class="action-btn" onclick="copySummaryText()">Copy Log to Clipboard</button><button class="action-btn" style="background-color:#222;" onclick="location.reload()">Start New Session</button></div>
<script>
const DEFAULT_ROUTINE=[{title:"Warm up",sets:1,time:180,rest:false,color:'blue'},{title:"Surya Namaskar",sets:3,rest:false,color:'green'},{title:"Wall Push ups",sets:3,color:'green'},{title:"Squats",sets:3,prepTime:10,color:'cyan'},{title:"Rows",sets:3,color:'green'},{title:"Plank",sets:2,restSets:60,time:45,color:'purple'},{title:"Hollow Hold",sets:2,restSets:60,time:45,color:'purple'}];
let APP=JSON.parse(localStorage.getItem('app_data'));if(!APP)APP={cp:'p1',p:{'p1':{n:'User 1',rule:'',h:JSON.parse(localStorage.getItem('workout_history'))||[],s:{'s1':{n:'Routine 1',r:JSON.parse(localStorage.getItem('workout_routine'))||DEFAULT_ROUTINE,rule:''}},ls:'s1'}}};function saveApp(){if(typeof HISTORY!=='undefined')APP.p[APP.cp].h=HISTORY;if(typeof ROUTINE!=='undefined')APP.p[APP.cp].s[APP.p[APP.cp].ls].r=ROUTINE;localStorage.setItem('app_data',JSON.stringify(APP));}let dt=new Date(),day=dt.getDay(),hr=dt.getHours(),best={p:APP.cp,s:APP.p[APP.cp].ls};Object.keys(APP.p).forEach(pk=>{let pr=APP.p[pk];if((pr.rule||'').includes('day:'+day)||(pr.rule||'').includes('hr:'+hr))best.p=pk;Object.keys(pr.s).forEach(sk=>{let sr=pr.s[sk];if((sr.rule||'').includes('day:'+day)||(sr.rule||'').includes('hr:'+hr)){best.p=pk;best.s=sk;}})});APP.cp=best.p;APP.p[APP.cp].ls=best.s;let ROUTINE=APP.p[APP.cp].s[APP.p[APP.cp].ls].r,HISTORY=APP.p[APP.cp].h,DEFAULT_SETTINGS={restTime:90,restBetweenExercises:false,transitionDelay:3,historyRetentionDays:30,beepVolume:1.0},storedSettings=APP.p[APP.cp].settings||{},SETTINGS={...DEFAULT_SETTINGS,...storedSettings},sequence=[],currentIndex=-1,records=[],totalStartTime=null,stepStartTime=null,mainInterval=null,audioCtx=null,beepInterval=null,isBeeping=false,wakeLock=null,currentTab='history',historySortOrder='newest',isFinished=false,lastPreBeep=0,isPaused=false,pauseTimestamp=0;function changeProf(p,s){if(p)APP.cp=p;if(s)APP.p[APP.cp].ls=s;else APP.p[APP.cp].ls=Object.keys(APP.p[APP.cp].s)[0];saveApp();location.reload();}function mgrProf(t){let isP=t==='p',id=isP?APP.cp:APP.p[APP.cp].ls,obj=isP?APP.p[id]:APP.p[APP.cp].s[id],rDay=(obj.rule||'').match(/day:(\d)/)?.[1]||'',rHr=(obj.rule||'').match(/hr:(\d+)/)?.[1]||'';showModal(isP?"Manage Person":"Manage Session",'<div class="form-group"><label>Name</label><input type="text" id="pm-name" value="'+obj.n+'"></div><div class="form-group"><label>Auto-Select Day</label><select id="pm-day" style="width:100%;background:#111;color:#fff;padding:10px;border:1px solid #444;border-radius:6px;"><option value="">None</option>'+[0,1,2,3,4,5,6].map(d=>'<option value="'+d+'" '+(rDay===String(d)?'selected':'')+'>'+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d]+'</option>').join('')+'</select></div><div class="form-group"><label>Auto-Select Hour (0-23)</label><input type="number" id="pm-hr" min="0" max="23" value="'+rHr+'"></div><div style="display:flex;gap:10px;margin-top:10px"><button class="action-btn" style="flex:1" onclick="saveProfMgr(\''+t+'\')">Save</button><button class="action-btn" style="flex:1;background:var(--c-red)" onclick="delProf(\''+t+'\')">Delete</button></div>',null,"Close",false,false);}function saveProfMgr(t){let isP=t==='p',id=isP?APP.cp:APP.p[APP.cp].ls,obj=isP?APP.p[id]:APP.p[APP.cp].s[id];obj.n=document.getElementById('pm-name').value;let dVal=document.getElementById('pm-day').value,hVal=document.getElementById('pm-hr').value;obj.rule=(dVal?'day:'+dVal:'')+(hVal?' hr:'+hVal:'');saveApp();renderSidebar();closeModal();}function newProf(t){let isP=t==='p',id='k'+Date.now();if(isP)APP.p[id]={n:'New Person',h:[],s:{'s1':{n:'New Routine',r:DEFAULT_ROUTINE}},ls:'s1'};else APP.p[APP.cp].s[id]={n:'New Routine',r:DEFAULT_ROUTINE};saveApp();changeProf(isP?id:null,isP?null:id);}function delProf(t){let isP=t==='p',id=isP?APP.cp:APP.p[APP.cp].ls;if(isP){if(Object.keys(APP.p).length>1){showModal("Delete Profile",`Are you sure you want to delete ${APP.p[id].n}?`,()=>{delete APP.p[id];changeProf(Object.keys(APP.p)[0],null);},"Delete",true);}else alert('Cannot delete last person');}else{if(Object.keys(APP.p[APP.cp].s).length>1){delete APP.p[APP.cp].s[id];changeProf(null,Object.keys(APP.p[APP.cp].s)[0]);}else alert('Cannot delete last session');}}
const elTotalTime=document.getElementById('total-time'),elBtn=document.getElementById('main-btn'),elTitle=document.getElementById('item-title'),elSubtitle=document.getElementById('item-subtitle'),elTime=document.getElementById('item-time'),elNextImmediate=document.getElementById('next-immediate'),elNextUpcoming=document.getElementById('next-upcoming'),uiWorkout=document.getElementById('workout-ui'),uiSummary=document.getElementById('summary-screen'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('overlay'),sidebarContent=document.getElementById('sidebar-content');
function cleanHistory(){const c=Date.now()-(SETTINGS.historyRetentionDays*86400000);HISTORY=HISTORY.filter(i=>i.timestamp>=c);saveApp();}function saveRoutine(){saveApp();sequence=buildSequence();renderSidebar();updateNextPreview();}function saveSettings(){APP.p[APP.cp].settings=SETTINGS;saveApp();cleanHistory();sequence=buildSequence();updateNextPreview();}function saveHistoryData(){saveApp();}
function showModal(t,b,oc,ct="Confirm",d=false,sc=true){document.getElementById('modal-title').innerText=t;document.getElementById('modal-body').innerHTML=b;const bc=document.getElementById('modal-cancel'),bcn=document.getElementById('modal-confirm');bc.style.display=sc?'block':'none';bc.onclick=closeModal;bcn.innerText=ct;bcn.className=d?'btn-danger':'btn-confirm';bcn.onclick=()=>{if(oc)oc();closeModal();};document.getElementById('custom-modal').classList.add('open');}function closeModal(){document.getElementById('custom-modal').classList.remove('open');}
function toggleSidebar(){sidebar.classList.toggle('open');overlay.classList.toggle('open');if(sidebar.classList.contains('open'))renderSidebar();}function switchTab(t){currentTab=t;document.getElementById('tab-ex').classList.toggle('active',t==='exercise');document.getElementById('tab-hist').classList.toggle('active',t==='history');renderSidebar();}function updateSetting(k,v){if(typeof v==='boolean')SETTINGS[k]=v;else SETTINGS[k]=parseFloat(v)||0;saveSettings();}
function renderSidebar(){document.getElementById('profile-container').innerHTML='<div style="display:flex;flex-direction:column;gap:6px;"><div style="display:flex;gap:4px;align-items:center;"><select id="sel-person" onchange="if(this.value===\'NEW_P\')newProf(\'p\');else changeProf(this.value,null)" style="background:#222;color:#fff;border:1px solid #444;border-radius:6px;padding:6px;font-size:0.75rem;width:130px;">'+Object.keys(APP.p).map(k=>'<option value="'+k+'" '+(k===APP.cp?'selected':'')+'>👤 '+APP.p[k].n+'</option>').join('')+'<option value="NEW_P">➕ New...</option></select><button onclick="mgrProf(\'p\')" style="background:#333;color:#fff;border:none;border-radius:6px;padding:6px 8px;font-size:0.75rem;">⚙</button></div><div style="display:flex;gap:4px;align-items:center;"><select id="sel-session" onchange="if(this.value===\'NEW_S\')newProf(\'s\');else changeProf(null,this.value)" style="background:#222;color:#fff;border:1px solid #444;border-radius:6px;padding:6px;font-size:0.75rem;width:130px;">'+Object.keys(APP.p[APP.cp].s).map(k=>'<option value="'+k+'" '+(k===APP.p[APP.cp].ls?'selected':'')+'>📋 '+APP.p[APP.cp].s[k].n+'</option>').join('')+'<option value="NEW_S">➕ New...</option></select><button onclick="mgrProf(\'s\')" style="background:#333;color:#fff;border:none;border-radius:6px;padding:6px 8px;font-size:0.75rem;">⚙</button></div></div>';sidebarContent.innerHTML='';if(currentTab==='exercise'){const sD=document.createElement('details');sD.className='settings-panel';sD.innerHTML=`<summary>Global Settings</summary><div class="settings-content"><div class="setting-row"><span>Rest Between Exercises</span><label class="switch"><input type="checkbox" ${SETTINGS.restBetweenExercises?'checked':''} onchange="updateSetting('restBetweenExercises',this.checked)"><span class="slider"></span></label></div><div class="setting-row"><span>Universal Rest (s)</span><input type="number" value="${SETTINGS.restTime}" onchange="updateSetting('restTime',this.value)"></div><div class="setting-row"><span>Transition Delay (s)</span><input type="number" value="${SETTINGS.transitionDelay}" onchange="updateSetting('transitionDelay',this.value)"></div><div class="setting-row"><span>Beep Vol</span><input type="range" min="0" max="2" step="0.1" value="${SETTINGS.beepVolume??1}" onchange="updateSetting('beepVolume',this.value)" style="width:70px"></div><div style="display:flex;gap:10px;margin-top:10px"><button class="action-btn" style="flex:1;padding:8px;font-size:0.8rem;margin:0" onclick="backupData()">Backup</button><label class="action-btn" style="flex:1;padding:8px;font-size:0.8rem;text-align:center;margin:0;cursor:pointer">Restore<input type="file" style="display:none" onchange="restoreData(event)"></label></div></div>`;sidebarContent.appendChild(sD);sidebarContent.innerHTML+='<div style="display:flex;gap:10px;margin-bottom:20px"><button class="add-btn-style" style="margin:0" onclick="showExerciseForm()">+ Ex</button><button class="add-btn-style" style="margin:0;background:#222;border-color:#a855f7" onclick="showCircuitForm()">+ Circuit</button></div>';ROUTINE.forEach((ex,idx)=>{if(ex.isCircuit){let h=`<div class="ex-item" style="border-left-color:transparent;flex-direction:column;align-items:stretch"><div style="display:flex;justify-content:space-between"><strong>Circuit: ${ex.rounds} Rounds</strong><div class="ex-actions"><button onclick="moveExercise(${idx},-1)">↑</button><button onclick="moveExercise(${idx},1)">↓</button><button onclick="unpackCircuit(${idx})">⎋</button></div></div><div style="margin-top:10px;border-left:1px solid #444;padding-left:10px">`;ex.exercises.forEach(cex=>{h+=`<div style="font-size:0.8rem;color:var(--c-${cex.color||'green'})">${cex.title} (${cex.sets} sets)</div>`;});h+='</div></div>';sidebarContent.insertAdjacentHTML('beforeend',h);}else{let d=document.createElement('div');d.className='ex-item';d.style.borderLeftColor=`var(--c-${ex.color||'green'})`;d.innerHTML=`<div class="ex-info"><strong>${ex.title}</strong><div>${ex.sets} sets ${ex.time?`• ${ex.time}s hold`:''}</div><div style="font-size:0.7rem">${ex.rest===false?'No Rest':(ex.restSets||ex.restNext?`Rest: Sets ${ex.restSets||'Gl'}s, Next ${ex.restNext||'Gl'}s`:'Rest: Global')} ${ex.prepTime?`• Prep: ${ex.prepTime}s`:''}</div></div><div class="ex-actions"><button onclick="moveExercise(${idx},-1)">↑</button><button onclick="moveExercise(${idx},1)">↓</button><button onclick="showExerciseForm(${idx})">✎</button><button onclick="deleteExerciseVerify(${idx})">✕</button></div>`;sidebarContent.appendChild(d);}});}else{const hS=document.createElement('details');hS.className='settings-panel';hS.innerHTML=`<summary>History Settings</summary><div class="settings-content"><div class="setting-row"><span>Retention (Days)</span><select onchange="updateSetting('historyRetentionDays',this.value)"><option value="7" ${SETTINGS.historyRetentionDays===7?'selected':''}>7 Days</option><option value="30" ${SETTINGS.historyRetentionDays===30?'selected':''}>30 Days</option><option value="90" ${SETTINGS.historyRetentionDays===90?'selected':''}>90 Days</option><option value="999" ${SETTINGS.historyRetentionDays===999?'selected':''}>Forever</option></select></div><div class="setting-row"><span>Newest First</span><label class="switch"><input type="checkbox" ${SETTINGS.historySortNewest!==false?'checked':''} onchange="updateSetting('historySortNewest',this.checked)"><span class="slider"></span></label></div></div>`;sidebarContent.appendChild(hS);sidebarContent.innerHTML+='<div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase">Workout Logs</span><button style="background:none;border:none;color:var(--c-blue);cursor:pointer;font-size:0.8rem" onclick="addManualHistory()">+ Add Log</button></div>';if(HISTORY.length===0)sidebarContent.innerHTML+='<div style="color:var(--text-muted);text-align:center;padding:20px">No logs found.</div>';let dH=[...HISTORY];if(SETTINGS.historySortNewest===false)dH.reverse();dH.forEach(i=>{const rI=HISTORY.indexOf(i);const d=document.createElement('details');d.className='history-item';d.innerHTML=`<summary>${i.date} <span style="float:right;font-weight:normal;font-size:0.75rem;color:var(--text-muted)">▼ Expand</span></summary><div class="history-content"><pre>${i.summary}</pre><div class="history-actions"><button onclick="copySpecificHistory(${rI})">Copy</button><button onclick="editHistory(${rI})">Edit</button><button style="background:#dc2626" onclick="deleteHistoryVerify(${rI})">Delete</button></div></div>`;sidebarContent.appendChild(d);});}}
function moveExercise(idx,dir){if(idx+dir<0||idx+dir>=ROUTINE.length)return;const t=ROUTINE[idx];ROUTINE[idx]=ROUTINE[idx+dir];ROUTINE[idx+dir]=t;saveRoutine();}function showCircuitForm(){let o=ROUTINE.map((e,i)=>!e.isCircuit?`<option value="${i}">${e.title}</option>`:'').join('');showModal("Create Circuit",`<div class="form-group"><label>Start Ex</label><select id="c-start" onchange="let s=parseInt(this.value);Array.from(document.getElementById('c-end').options).forEach(x=>x.disabled=parseInt(x.value)<s)">${o}</select></div><div class="form-group"><label>End Ex</label><select id="c-end">${o}</select></div><div class="form-group"><label>Rounds</label><input type="number" id="c-rounds" value="3"></div><div class="form-group"><label>Rest After Round (s)</label><input type="number" id="c-rest" value="60"></div>`,()=>{let s=parseInt(document.getElementById('c-start').value),e=parseInt(document.getElementById('c-end').value);if(s>e)return alert('Invalid range');let c={isCircuit:true,rounds:parseInt(document.getElementById('c-rounds').value),rest:parseInt(document.getElementById('c-rest').value),exercises:ROUTINE.splice(s,e-s+1)};ROUTINE.splice(s,0,c);saveRoutine();},"Create");}function unpackCircuit(idx){let c=ROUTINE[idx];ROUTINE.splice(idx,1,...c.exercises);saveRoutine();}
function showExerciseForm(i=-1){const e=i>=0?ROUTINE[i]:{title:'',sets:3,time:'',rest:true,restSets:'',restNext:'',prepTime:'',prepEachSet:false,color:'green'};const c=['green','blue','orange','purple','red','pink','yellow','teal','cyan'];sidebarContent.innerHTML=`<div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:15px;text-transform:uppercase">${i>=0?'Edit':'New'} Exercise</div><div class="form-group"><label>Title</label><input type="text" id="f-title" value="${e.title}" placeholder="e.g. Push ups"></div><div class="form-group"><label>Sets</label><input type="number" id="f-sets" value="${e.sets}"></div><div class="form-group"><label>Prep Time (s)</label><input type="number" id="f-prep" value="${e.prepTime||''}"></div><div class="form-group"><label><input type="checkbox" id="f-prepeach" ${e.prepEachSet?'checked':''}> Prep before each set</label></div><div class="form-group"><label>Hold Time (s)</label><input type="number" id="f-time" value="${e.time||''}"></div><div class="form-group"><label>Rest Between Sets (s)</label><input type="number" id="f-restSets" value="${e.restSets||''}"></div><div class="form-group"><label>Rest After Exercise (s)</label><input type="number" id="f-restNext" value="${e.restNext||''}"></div><div class="form-group"><label>Color Tag</label><select id="f-color">${c.map(x=>`<option value="${x}" ${e.color===x?'selected':''}>${x.charAt(0).toUpperCase()+x.slice(1)}</option>`).join('')}</select></div><div class="form-group"><label><input type="checkbox" id="f-rest" ${e.rest!==false?'checked':''}> Enable rest</label></div><button class="action-btn" style="width:100%" onclick="saveExerciseForm(${i})">Save</button><button class="action-btn" style="width:100%;background:#444" onclick="renderSidebar()">Cancel</button>`;}
function saveExerciseForm(i){const n={title:document.getElementById('f-title').value||'Untitled',sets:parseInt(document.getElementById('f-sets').value)||1,time:parseInt(document.getElementById('f-time').value)||null,prepTime:parseInt(document.getElementById('f-prep').value)||null,prepEachSet:document.getElementById('f-prepeach').checked,restSets:parseInt(document.getElementById('f-restSets').value)||null,restNext:parseInt(document.getElementById('f-restNext').value)||null,color:document.getElementById('f-color').value||'green',rest:document.getElementById('f-rest').checked};if(i>=0)ROUTINE[i]=n;else ROUTINE.push(n);saveRoutine();}function deleteExerciseVerify(i){showModal("Delete",`Remove ${ROUTINE[i].title}?`,()=>{ROUTINE.splice(i,1);saveRoutine();},"Delete",true);}
let pendingRestore=null;function backupData(){showModal("Backup",`<label style="display:block;margin-bottom:10px"><input type="checkbox" id="bk-ex" checked> Routines (All sessions)</label><label style="display:block"><input type="checkbox" id="bk-log" checked> Logs</label>`,()=>{let d={settings:SETTINGS};if(document.getElementById('bk-ex').checked)d.sessions=APP.p[APP.cp].s;if(document.getElementById('bk-log').checked)d.history=HISTORY;let b=new Blob([JSON.stringify(d)],{type:'application/json'}),a=document.createElement('a'),n=new Date(),p=x=>x.toString().padStart(2,'0');a.download=`WorkoutTracker_${n.getFullYear()}${p(n.getMonth()+1)}${p(n.getDate())}${p(n.getHours())}${p(n.getMinutes())}${p(n.getSeconds())}.json`;a.href=URL.createObjectURL(b);a.click();},"Download");}function restoreData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=(ev)=>{try{pendingRestore=JSON.parse(ev.target.result);showModal("Restore",`<label style="display:block;margin-bottom:10px"><input type="checkbox" id="rs-ex" checked> Restore Exercises</label><label style="display:block"><input type="checkbox" id="rs-log" checked> Restore Logs</label>`,()=>{if(document.getElementById('rs-ex').checked){if(pendingRestore.sessions)APP.p[APP.cp].s=pendingRestore.sessions;else if(pendingRestore.routine)APP.p[APP.cp].s['imp'+Date.now()]={n:'Imported',r:pendingRestore.routine,rule:''};APP.p[APP.cp].ls=Object.keys(APP.p[APP.cp].s)[0];}if(document.getElementById('rs-log').checked&&pendingRestore.history)APP.p[APP.cp].h=pendingRestore.history;if(pendingRestore.settings)APP.p[APP.cp].settings=pendingRestore.settings;saveApp();location.reload();},"Restore");}catch(x){alert("Invalid file");}};r.readAsText(f);e.target.value='';}
function addManualHistory(){showModal("Add Log",`<div class="form-group"><label>Date / Title</label><input type="text" id="h-title" value="${new Date().toLocaleDateString()}"></div><div class="form-group"><label>Summary</label><textarea id="h-sum"></textarea></div>`,()=>{const d=document.getElementById('h-title').value,s=document.getElementById('h-sum').value;if(d&&s){HISTORY.unshift({id:Date.now().toString(),timestamp:Date.now(),date:d,summary:s});saveHistoryData();renderSidebar();}},"Save");}function editHistory(i){const x=HISTORY[i];showModal("Edit Log",`<div class="form-group"><label>Date / Title</label><input type="text" id="h-title" value="${x.date}"></div><div class="form-group"><label>Summary</label><textarea id="h-sum">${x.summary}</textarea></div>`,()=>{HISTORY[i].date=document.getElementById('h-title').value;HISTORY[i].summary=document.getElementById('h-sum').value;saveHistoryData();renderSidebar();},"Update");}function deleteHistoryVerify(i){showModal("Delete Log","Are you sure?",()=>{HISTORY.splice(i,1);saveHistoryData();renderSidebar();},"Delete",true);}function copySpecificHistory(i){navigator.clipboard.writeText(HISTORY[i].summary).then(()=>showModal("Copied","Log copied to clipboard!",null,"OK",false,false));}function escapeHtml(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");}
function buildSequence(){let q=[];ROUTINE.forEach((i,x)=>{if(i.isCircuit){for(let r=1;r<=i.rounds;r++){i.exercises.forEach((e,j)=>{let rs=e.restSets||SETTINGS.restTime,rn=e.restNext||SETTINGS.restTime;for(let s=1;s<=e.sets;s++){if(e.prepTime>0&&(s===1||e.prepEachSet))q.push({type:'PREP',title:'PREPARE',targetTime:e.prepTime,nextInfo:`${e.title} (R${r} S${s})`,color:'yellow',autoAdvanced:false});q.push({type:'EXERCISE',title:e.title,set:s,totalSets:e.sets,targetTime:e.time||null,color:e.color||'green'});let l=(s===e.sets);if(!l&&e.rest!==false)q.push({type:'REST',title:'REST',targetTime:rs,nextInfo:`${e.title} (Set ${s+1})`,color:'orange'});else if(l&&j<i.exercises.length-1&&e.rest!==false)q.push({type:'REST',title:'REST',targetTime:rn,nextInfo:i.exercises[j+1].title,color:'orange'});}});if(r<i.rounds&&i.rest>0)q.push({type:'REST',title:'CIRCUIT REST',targetTime:i.rest,nextInfo:`Circuit Round ${r+1}`,color:'orange'});}}else{let rs=i.restSets||SETTINGS.restTime,rn=i.restNext||SETTINGS.restTime;for(let s=1;s<=i.sets;s++){if(i.prepTime>0&&(s===1||i.prepEachSet))q.push({type:'PREP',title:'PREPARE',targetTime:i.prepTime,nextInfo:`${i.title} (Set ${s})`,color:'yellow',autoAdvanced:false});q.push({type:'EXERCISE',title:i.title,set:s,totalSets:i.sets,targetTime:i.time||null,color:i.color||'green'});let l=(s===i.sets);if(!l&&i.rest!==false)q.push({type:'REST',title:'REST',targetTime:rs,nextInfo:`${i.title} (Set ${s+1})`,color:'orange'});else if(l&&x<ROUTINE.length-1&&SETTINGS.restBetweenExercises){let nt=ROUTINE[x+1].isCircuit?ROUTINE[x+1].exercises[0]?.title:ROUTINE[x+1].title;q.push({type:'REST',title:'REST',targetTime:rn,nextInfo:nt,color:'orange'});}}}});return q;}
function formatTime(s,f=false){let n=s<0;s=Math.abs(s);const m=Math.floor(s/60).toString().padStart(2,'0'),c=Math.floor(s%60).toString().padStart(2,'0');return `${n?'-':(f?'+':'')}${m}:${c}`;}function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();}function playShortBeep(){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=432;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.setValueAtTime(0.3*(SETTINGS.beepVolume??1),audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);o.stop(audioCtx.currentTime+0.1);}function playLongBeep(){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=432;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.setValueAtTime(0.8*(SETTINGS.beepVolume??1),audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.6);o.stop(audioCtx.currentTime+0.6);}function startBeeping(){if(isBeeping)return;isBeeping=true;beepInterval=setInterval(()=>{if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=432;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.setValueAtTime(0.6*(SETTINGS.beepVolume??1),audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);o.stop(audioCtx.currentTime+0.3);},1000);}function stopBeeping(){if(beepInterval)clearInterval(beepInterval);beepInterval=null;isBeeping=false;}
function togglePause(){if(currentIndex===-1||isFinished)return;isPaused=!isPaused;const b=document.getElementById('btn-pause');if(isPaused){pauseTimestamp=Date.now();b.innerText='▶';b.classList.add('paused');stopBeeping();}else{const d=Date.now()-pauseTimestamp;totalStartTime+=d;stepStartTime+=d;b.innerText='⏸';b.classList.remove('paused');}}function skipStep(){if(currentIndex===-1||isFinished)return;if(isPaused)togglePause();advanceStep(true);}async function requestWakeLock(){try{if('wakeLock' in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}}
function updateDisplay(){if(isPaused)return;if(totalStartTime)elTotalTime.innerText=formatTime((Date.now()-totalStartTime)/1000);if(currentIndex>=0&&currentIndex<sequence.length){const s=sequence[currentIndex],e=(Date.now()-stepStartTime)/1000;if(s.targetTime){let r=s.targetTime-e;if(r<=0){elTime.innerText="00:00";if(s.type==='PREP'){if(!s.autoAdvanced){s.autoAdvanced=true;playLongBeep();advanceStep(false);}}else{startBeeping();}}else{elTime.innerText=formatTime(-r);let sr=Math.ceil(r);if(sr<=3&&sr>0&&lastPreBeep!==sr){playShortBeep();lastPreBeep=sr;}}}else{elTime.innerText=formatTime(e,true);}}}
function updateNextPreview(){if(currentIndex+1<sequence.length){let n=sequence[currentIndex+1],t="";if(n.type==='REST')t=`REST (${formatTime(n.targetTime)}) before ${n.nextInfo}`;else if(n.type==='PREP')t=`PREP (${n.targetTime}s) for ${n.nextInfo}`;else t=`Set ${n.set}/${n.totalSets} of ${n.title}`;elNextImmediate.innerText="Next: "+t;let u=null,a="";for(let i=currentIndex+1;i<sequence.length;i++){if(sequence[i].type==='EXERCISE'){if(!a)a=sequence[i].title;else if(sequence[i].title!==a){u=sequence[i].title;break;}}}if(u)elNextUpcoming.innerText="Then: "+u;else elNextUpcoming.innerText="Then: Session Complete";}else{elNextImmediate.innerText="Final Step";elNextUpcoming.innerText="";}}
function advanceStep(k=false){if(isFinished)return;if(isPaused)togglePause();initAudio();stopBeeping();lastPreBeep=0;if(currentIndex===-1){totalStartTime=Date.now();requestWakeLock();mainInterval=setInterval(updateDisplay,100);}else if(currentIndex<sequence.length){const s=sequence[currentIndex];if(s&&!k){let e=(Date.now()-stepStartTime)/1000;if(s.type==='EXERCISE'&&!s.targetTime)e=Math.max(0,e-SETTINGS.transitionDelay);records.push({type:s.type,title:s.title,set:s.set,duration:e});}}currentIndex++;if(currentIndex>=sequence.length){finishWorkout(false);return;}const s=sequence[currentIndex];stepStartTime=Date.now();elBtn.className=`circle-btn color-${s.color||'blue'}`;if(s.type==='EXERCISE'){elTitle.innerText=s.title;elSubtitle.innerText=`Set ${s.set} of ${s.totalSets}`;}else{elTitle.innerText=s.title;elSubtitle.innerText=`Up next: ${s.nextInfo}`;}elTime.innerText=s.targetTime?formatTime(-s.targetTime):"+00:00";updateNextPreview();}
function finishWorkout(m=false){if(isFinished)return;isFinished=true;if(currentIndex>=0&&currentIndex<sequence.length&&m){const s=sequence[currentIndex];let e=(Date.now()-stepStartTime)/1000;if(s.type==='EXERCISE'&&!s.targetTime)e=Math.max(0,e-SETTINGS.transitionDelay);records.push({type:s.type,title:s.title,set:s.set,duration:e});}if(mainInterval)clearInterval(mainInterval);elBtn.className='circle-btn color-purple';elTitle.innerText="COMPLETE";elSubtitle.innerText="Session finished!";elTime.innerText="";elNextImmediate.innerText="Creating report...";elNextUpcoming.innerText="";setTimeout(generateSummaryText,1000);}
function generateSummaryText(){uiWorkout.style.display='none';uiSummary.style.display='flex';const n=new Date(),dS=n.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}),sS=new Date(totalStartTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),eS=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),tD=formatTime((n-totalStartTime)/1000);let t=`Workout Log: ${dS}\nTimeline: ${sS} - ${eS}\nTotal Duration: ${tD}\n\n`;records.forEach(r=>{if(r.type==='REST'||r.type==='PREP')t+=`[${r.title}] ${formatTime(r.duration)}\n`;else t+=`${r.title} (Set ${r.set}): ${formatTime(r.duration)}\n`;});t+=`\n*Manual sets include a -${SETTINGS.transitionDelay}s delay correction.*`;document.getElementById('summary-text').value=t;HISTORY.unshift({id:Date.now().toString(),timestamp:Date.now(),date:dS+' '+sS,summary:t});saveHistoryData();}function copySummaryText(){navigator.clipboard.writeText(document.getElementById('summary-text').value).then(()=>showModal("Copied","Log copied to clipboard!",null,"OK",false,false));}window.onload=()=>{cleanHistory();sequence=buildSequence();updateNextPreview();elBtn.addEventListener('click',()=>advanceStep(false));renderSidebar();};
</script></body></html>
