<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Workout Tracker</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface-color: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --color-ready: #3b82f6;
            
            /* Extended Colors */
            --color-rest: #f97316;
            --color-done: #a855f7;
            --color-ex-default: #22c55e; /* Green */
            --color-ex-blue: #3b82f6;
            --color-ex-red: #ef4444;
            --color-ex-yellow: #eab308;
            --color-ex-pink: #ec4899;
            --color-ex-cyan: #06b6d4;

            --sidebar-width: 280px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Sidebar & Navigation */
        .hamburger {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
        }
        .hamburger div {
            width: 20px;
            height: 2px;
            background-color: var(--text-main);
            margin: 4px 0;
            transition: 0.3s;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: calc(-1 * var(--sidebar-width));
            width: var(--sidebar-width);
            height: 100%;
            background: var(--surface-color);
            z-index: 110;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }
        .sidebar.open { left: 0; }
        
        .sidebar-header {
            padding: 50px 12px 12px 12px;
            border-bottom: 1px solid #333;
            display: flex;
            gap: 8px;
        }
        .tab-btn {
            flex: 1;
            padding: 8px 4px;
            background: transparent;
            border: 1px solid #444;
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: var(--color-ready);
            color: white;
            border-color: var(--color-ready);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        /* Compact UI Elements */
        .settings-panel {
            background: #111;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #222;
        }
        .settings-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.8rem;
        }
        .setting-row select, .setting-row input[type="number"] {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .ex-item {
            background: #222;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ex-info { flex: 1; }
        .ex-info strong { font-size: 0.85rem; display: block; margin-bottom: 2px; }
        .ex-info div { font-size: 0.7rem; color: var(--text-muted); }
        
        .ex-actions { display: flex; align-items: center; gap: 4px; }
        .ex-actions button {
            background: #333;
            border: none;
            color: var(--text-main);
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ex-actions button:active { background: #444; }

        .add-ex-btn {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px dashed #444;
            color: white;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* History Items */
        .history-item {
            border-left: 3px solid var(--color-done);
            background: #222;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            position: relative;
        }
        .history-item .date { font-weight: bold; font-size: 0.75rem; margin-bottom: 4px; color: var(--color-done); }
        .history-item .summary { 
            font-size: 0.7rem; 
            color: var(--text-muted); 
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .history-controls {
            display: flex;
            gap: 6px;
        }
        .hist-btn {
            flex: 1;
            padding: 6px;
            font-size: 0.65rem;
            background: #333;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Main UI Elements */
        .top-bar { padding: 8dvh 5vw 2dvh 5vw; text-align: center; font-size: 4vw; color: var(--text-muted); letter-spacing: 1px; }
        .top-bar #total-time { color: var(--text-main); font-weight: bold; font-family: monospace; font-size: 2rem; display: block; margin-top: 5px; }
        
        @media (min-width: 768px) {
            .top-bar { font-size: 1.2rem; }
            .top-bar #total-time { font-size: 2.8rem; }
        }

        .center-stage { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2dvh 5vw; }
        .circle-btn {
            width: 75vw; max-width: 320px; aspect-ratio: 1 / 1; border-radius: 50%;
            background-color: var(--surface-color); border: 1.5vw solid var(--color-ready);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; color: var(--text-main);
        }
        
        /* Dynamic State Colors */
        .circle-btn.state-rest { border-color: var(--color-rest); }
        .circle-btn.state-done { border-color: var(--color-done); }
        .circle-btn.state-ex-default { border-color: var(--color-ex-default); box-shadow: 0 0 50px rgba(34, 197, 94, 0.2); }
        .circle-btn.state-ex-blue { border-color: var(--color-ex-blue); box-shadow: 0 0 50px rgba(59, 130, 246, 0.2); }
        .circle-btn.state-ex-red { border-color: var(--color-ex-red); box-shadow: 0 0 50px rgba(239, 68, 68, 0.2); }
        .circle-btn.state-ex-yellow { border-color: var(--color-ex-yellow); box-shadow: 0 0 50px rgba(234, 179, 8, 0.2); }
        .circle-btn.state-ex-pink { border-color: var(--color-ex-pink); box-shadow: 0 0 50px rgba(236, 72, 153, 0.2); }
        .circle-btn.state-ex-cyan { border-color: var(--color-ex-cyan); box-shadow: 0 0 50px rgba(6, 182, 212, 0.2); }

        #item-title { font-size: 7vw; font-weight: 700; text-align: center; padding: 0 5vw; margin-bottom: 1dvh; }
        #item-subtitle { font-size: 3.5vw; color: var(--text-muted); margin-bottom: 2dvh; }
        #item-time { font-size: 14vw; font-weight: 800; font-family: monospace; }

        .bottom-bar { padding: 4dvh 5vw; text-align: center; font-size: 4.5vw; color: var(--text-muted); }
        #next-item { color: var(--text-main); font-weight: 600; display: block; margin-top: 5px; font-size: 5.5vw; line-height: 1.3; }

        @media (min-width: 768px) {
            .bottom-bar { font-size: 1.2rem; }
            #next-item { font-size: 1.8rem; }
        }

        /* Summary Screen */
        #summary-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-color); display: none; flex-direction: column; padding: 5dvh 5vw; z-index: 120;
        }
        #summary-screen h2 { text-align: center; margin-bottom: 15px; color: var(--color-done); font-size: 1.2rem; }
        textarea {
            flex: 1; background: var(--surface-color); border: 1px solid #333; color: var(--text-main);
            border-radius: 12px; padding: 12px; font-family: monospace; font-size: 0.8rem; resize: none; margin-bottom: 15px;
        }
        .action-btn { background-color: var(--color-ready); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }

        .overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.8); z-index: 105; display: none; }
        .overlay.open { display: block; }

        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--color-ready); }
        input:checked + .slider:before { transform: translateX(16px); }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; background: #111; border: 1px solid #444; color: white; border-radius: 6px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <button class="hamburger" onclick="toggleSidebar()">
        <div></div><div></div><div></div>
    </button>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="tab-btn active" id="tab-hist" onclick="switchTab('history')">History</button>
            <button class="tab-btn" id="tab-ex" onclick="switchTab('exercise')">Exercises</button>
        </div>
        <div class="sidebar-content" id="sidebar-content"></div>
    </div>

    <div id="workout-ui" style="display: flex; flex-direction: column; height: 100dvh;">
        <div class="top-bar">
            TOTAL ELAPSED TIME <br>
            <span id="total-time">00:00</span>
        </div>
        <div class="center-stage">
            <button id="main-btn" class="circle-btn">
                <div id="item-title">READY</div>
                <div id="item-subtitle">Tap to start workout</div>
                <div id="item-time">GO</div>
            </button>
        </div>
        <div class="bottom-bar">
            <span id="next-item">Loading...</span>
        </div>
    </div>

    <div id="summary-screen">
        <h2>Session Report</h2>
        <textarea id="summary-text" readonly></textarea>
        <button class="action-btn" onclick="copyToClipboard(document.getElementById('summary-text').value)">Copy to Clipboard</button>
        <button class="action-btn" style="background-color: #222;" onclick="location.reload()">Done</button>
    </div>

    <script>
        // Data Persistence
        const DEFAULT_ROUTINE = [
            { title: "Warm up", sets: 1, time: 180, rest: false, color: "blue", prepTime: null }, 
            { title: "Surya Namaskar", sets: 3, rest: false, color: "default" },
            { title: "Wall Push ups", sets: 3, color: "default" },
            { title: "Squats", sets: 3, color: "default" },
            { title: "Rows", sets: 3, color: "default" },
            { title: "Plank", sets: 2, customRest: 60, time: 45, color: "pink", prepTime: 5 },
            { title: "Hollow Hold", sets: 2, customRest: 60, time: 45, color: "pink", prepTime: 5 }
        ];

        let ROUTINE = JSON.parse(localStorage.getItem('workout_routine')) || DEFAULT_ROUTINE;
        let HISTORY = JSON.parse(localStorage.getItem('workout_history')) || [];
        
        const DEFAULT_SETTINGS = {
            restTime: 90,
            restBetweenExercises: false,
            transitionDelay: 3,
            historyDays: 30,
            historySortNewest: true
        };
        let SETTINGS = JSON.parse(localStorage.getItem('workout_settings')) || DEFAULT_SETTINGS;

        function saveAll() {
            localStorage.setItem('workout_routine', JSON.stringify(ROUTINE));
            localStorage.setItem('workout_history', JSON.stringify(HISTORY));
            localStorage.setItem('workout_settings', JSON.stringify(SETTINGS));
        }

        function cleanHistory() {
            const cutoff = Date.now() - (SETTINGS.historyDays * 24 * 60 * 60 * 1000);
            HISTORY = HISTORY.filter(item => {
                const itemDate = new Date(item.timestamp || 0).getTime();
                return itemDate > cutoff;
            });
            saveAll();
        }

        // State
        let sequence = [];
        let currentIndex = -1;
        let records = [];
        let totalStartTime = null;
        let stepStartTime = null;
        let mainInterval = null;
        let audioCtx = null;
        let beepInterval = null;
        let isBeeping = false;
        let wakeLock = null;
        let currentTab = 'history'; 
        let workoutCompleted = false;
        let settingsExpanded = false; // Collapsed by default

        const elTotalTime = document.getElementById('total-time');
        const elBtn = document.getElementById('main-btn');
        const elTitle = document.getElementById('item-title');
        const elSubtitle = document.getElementById('item-subtitle');
        const elTime = document.getElementById('item-time');
        const elNext = document.getElementById('next-item');
        const uiWorkout = document.getElementById('workout-ui');
        const uiSummary = document.getElementById('summary-screen');
        const sidebar = document.getElementById('sidebar');
        const sidebarContent = document.getElementById('sidebar-content');

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
            if(sidebar.classList.contains('open')) renderSidebar();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-ex').classList.toggle('active', tab === 'exercise');
            document.getElementById('tab-hist').classList.toggle('active', tab === 'history');
            renderSidebar();
        }

        function updateSetting(key, value) {
            SETTINGS[key] = value;
            saveAll();
            if(key === 'historySortNewest') renderSidebar();
            sequence = buildSequence();
            updateNextPreview();
        }

        function toggleSettingsPanel() {
            settingsExpanded = !settingsExpanded;
            renderSidebar();
        }

        function renderSidebar() {
            sidebarContent.innerHTML = '';
            
            if (currentTab === 'exercise') {
                const settingsDiv = document.createElement('div');
                settingsDiv.className = 'settings-panel';
                settingsDiv.innerHTML = `
                    <div class="settings-title" style="cursor:pointer;" onclick="toggleSettingsPanel()">
                        Preferences <span>${settingsExpanded ? '▲' : '▼'}</span>
                    </div>
                    <div id="settings-rows" style="display: ${settingsExpanded ? 'block' : 'none'};">
                        <div class="setting-row">
                            <span>Rest B/W Exercises</span>
                            <label class="switch">
                                <input type="checkbox" ${SETTINGS.restBetweenExercises ? 'checked' : ''} onchange="updateSetting('restBetweenExercises', this.checked)">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-row">
                            <span>Global Rest (s)</span>
                            <input type="number" value="${SETTINGS.restTime}" onchange="updateSetting('restTime', parseInt(this.value))">
                        </div>
                        <div class="setting-row">
                            <span>Transition (s)</span>
                            <input type="number" value="${SETTINGS.transitionDelay}" onchange="updateSetting('transitionDelay', parseInt(this.value))">
                        </div>
                    </div>
                `;
                sidebarContent.appendChild(settingsDiv);

                const addBtn = document.createElement('button');
                addBtn.className = 'add-ex-btn';
                addBtn.innerText = '+ Add Exercise';
                addBtn.onclick = () => showExerciseForm();
                sidebarContent.appendChild(addBtn);

                ROUTINE.forEach((ex, idx) => {
                    const div = document.createElement('div');
                    div.className = 'ex-item';
                    div.innerHTML = `
                        <div class="ex-info">
                            <strong>${ex.title}</strong>
                            <div>${ex.sets} sets ${ex.time ? `• ${ex.time}s` : ''} ${ex.prepTime ? `• ${ex.prepTime}s Prep` : ''}</div>
                        </div>
                        <div class="ex-actions">
                            <button onclick="moveEx(${idx}, -1)">↑</button>
                            <button onclick="moveEx(${idx}, 1)">↓</button>
                            <button onclick="showExerciseForm(${idx})">✎</button>
                            <button onclick="deleteEx(${idx})">✕</button>
                        </div>
                    `;
                    sidebarContent.appendChild(div);
                });
            } else {
                const histSettings = document.createElement('div');
                histSettings.className = 'settings-panel';
                histSettings.innerHTML = `
                    <div class="settings-title" style="cursor:pointer;" onclick="toggleSettingsPanel()">
                        History Settings <span>${settingsExpanded ? '▲' : '▼'}</span>
                    </div>
                    <div id="settings-rows" style="display: ${settingsExpanded ? 'block' : 'none'};">
                        <div class="setting-row">
                            <span>Retention (Days)</span>
                            <select onchange="updateSetting('historyDays', parseInt(this.value))">
                                <option value="7" ${SETTINGS.historyDays === 7 ? 'selected' : ''}>7 Days</option>
                                <option value="30" ${SETTINGS.historyDays === 30 ? 'selected' : ''}>30 Days</option>
                                <option value="90" ${SETTINGS.historyDays === 90 ? 'selected' : ''}>90 Days</option>
                                <option value="999" ${SETTINGS.historyDays === 999 ? 'selected' : ''}>Forever</option>
                            </select>
                        </div>
                        <div class="setting-row">
                            <span>Newest First</span>
                            <label class="switch">
                                <input type="checkbox" ${SETTINGS.historySortNewest ? 'checked' : ''} onchange="updateSetting('historySortNewest', this.checked)">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                `;
                sidebarContent.appendChild(histSettings);

                let displayHist = [...HISTORY];
                if (!SETTINGS.historySortNewest) displayHist.reverse();

                if(displayHist.length === 0) {
                    sidebarContent.innerHTML += '<div style="color:var(--text-muted); text-align:center; padding:20px; font-size:0.8rem;">No history recorded yet.</div>';
                }

                displayHist.forEach((item) => {
                    const originalIdx = HISTORY.indexOf(item);
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `
                        <div class="date">${item.date}</div>
                        <div class="summary">${item.summary}</div>
                        <div class="history-controls">
                            <button class="hist-btn" onclick="copyToClipboard(HISTORY[${originalIdx}].summary)">Copy</button>
                            <button class="hist-btn" onclick="editHistory(${originalIdx})">Edit</button>
                            <button class="hist-btn" style="background:#b91c1c" onclick="deleteHistory(${originalIdx})">Del</button>
                        </div>
                    `;
                    sidebarContent.appendChild(div);
                });
            }
        }

        function moveEx(idx, dir) {
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= ROUTINE.length) return;
            const item = ROUTINE.splice(idx, 1)[0];
            ROUTINE.splice(newIdx, 0, item);
            saveAll();
            sequence = buildSequence();
            renderSidebar();
        }

        function deleteEx(idx) {
            if(confirm("Remove this exercise?")) {
                ROUTINE.splice(idx, 1);
                saveAll();
                sequence = buildSequence();
                renderSidebar();
            }
        }

        function deleteHistory(idx) {
            if(confirm("Delete this log?")) {
                HISTORY.splice(idx, 1);
                saveAll();
                renderSidebar();
            }
        }

        function editHistory(idx) {
            const newText = prompt("Edit log content:", HISTORY[idx].summary);
            if(newText !== null) {
                HISTORY[idx].summary = newText;
                saveAll();
                renderSidebar();
            }
        }

        function showExerciseForm(idx = -1) {
            const ex = idx >= 0 ? ROUTINE[idx] : { title: '', sets: 3, time: '', rest: true, customRest: '', prepTime: '', color: 'default' };
            sidebarContent.innerHTML = `
                <div class="settings-title">${idx >= 0 ? 'Edit' : 'New'} Exercise</div>
                <div class="form-group"><label>Title</label><input type="text" id="f-title" value="${ex.title}"></div>
                <div class="form-group">
                    <label>Circle Color</label>
                    <select id="f-color">
                        <option value="default" ${ex.color==='default'?'selected':''}>Green (Default)</option>
                        <option value="blue" ${ex.color==='blue'?'selected':''}>Blue</option>
                        <option value="red" ${ex.color==='red'?'selected':''}>Red</option>
                        <option value="yellow" ${ex.color==='yellow'?'selected':''}>Yellow</option>
                        <option value="pink" ${ex.color==='pink'?'selected':''}>Pink</option>
                        <option value="cyan" ${ex.color==='cyan'?'selected':''}>Cyan</option>
                    </select>
                </div>
                <div class="form-group"><label>Sets</label><input type="number" id="f-sets" value="${ex.sets}"></div>
                <div class="form-group"><label>Prep Time (s, before 1st set)</label><input type="number" id="f-prep" value="${ex.prepTime || ''}"></div>
                <div class="form-group"><label>Hold Time (s)</label><input type="number" id="f-time" value="${ex.time || ''}"></div>
                <div class="form-group"><label>Rest Time (s)</label><input type="number" id="f-rest-t" value="${ex.customRest || ''}" placeholder="Global default"></div>
                <div class="form-group"><label><input type="checkbox" id="f-rest-en" ${ex.rest !== false ? 'checked' : ''} style="width:auto"> Enable Rest B/W Sets</label></div>
                <button class="action-btn" style="width:100%" onclick="saveExForm(${idx})">Save</button>
                <button class="action-btn" style="width:100%; background:#444" onclick="renderSidebar()">Cancel</button>
            `;
        }

        function saveExForm(idx) {
            const newEx = {
                title: document.getElementById('f-title').value || 'Untitled',
                color: document.getElementById('f-color').value || 'default',
                sets: parseInt(document.getElementById('f-sets').value) || 1,
                time: parseInt(document.getElementById('f-time').value) || null,
                prepTime: parseInt(document.getElementById('f-prep').value) || null,
                customRest: parseInt(document.getElementById('f-rest-t').value) || null,
                rest: document.getElementById('f-rest-en').checked
            };
            if (idx >= 0) ROUTINE[idx] = newEx;
            else ROUTINE.push(newEx);
            saveAll();
            sequence = buildSequence();
            renderSidebar();
        }

        function buildSequence() {
            let seq = [];
            ROUTINE.forEach((ex, i) => {
                let rEn = ex.hasOwnProperty('rest') ? ex.rest : true;
                let rDur = ex.customRest || SETTINGS.restTime;
                for (let s = 1; s <= ex.sets; s++) {
                    if (s === 1 && ex.prepTime) {
                        seq.push({ type: 'PREP', title: 'Prep', targetTime: ex.prepTime, nextInfo: ex.title });
                    }
                    seq.push({ type: 'EXERCISE', title: ex.title, set: s, totalSets: ex.sets, targetTime: ex.time || null, color: ex.color });
                    
                    if (s < ex.sets && rEn) {
                        seq.push({ type: 'REST', title: 'Rest', targetTime: rDur, nextInfo: `${ex.title} (Set ${s + 1})` });
                    } else if (s === ex.sets && i < ROUTINE.length - 1 && SETTINGS.restBetweenExercises) {
                        seq.push({ type: 'REST', title: 'Rest', targetTime: SETTINGS.restTime, nextInfo: `${ROUTINE[i+1].title}` });
                    }
                }
            });
            return seq;
        }

        function formatTime(s, sign = false) {
            let neg = s < 0; s = Math.abs(s);
            const m = Math.floor(s / 60).toString().padStart(2, '0');
            const sec = Math.floor(s % 60).toString().padStart(2, '0');
            return `${neg ? '-' : (sign ? '+' : '')}${m}:${sec}`;
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function beepOnce() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.value = 432; // 432 Hz frequency
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function startBeeping() { 
            if (isBeeping) return; 
            isBeeping = true;
            beepOnce();
            beepInterval = setInterval(beepOnce, 1000); 
        }

        function stopBeeping() { 
            if(beepInterval) clearInterval(beepInterval); 
            beepInterval = null; 
            isBeeping = false; 
        }

        function updateDisplay() {
            if (totalStartTime) elTotalTime.innerText = formatTime((Date.now() - totalStartTime) / 1000);
            if (currentIndex >= 0 && currentIndex < sequence.length) {
                const step = sequence[currentIndex];
                const elapsed = (Date.now() - stepStartTime) / 1000;
                
                if (step.targetTime) {
                    let rem = step.targetTime - elapsed;
                    if (rem <= 3 && rem > 0) {
                        elTime.innerText = formatTime(-rem);
                        if (!isBeeping) startBeeping(); // Start 3 seconds before ending
                    } else if (rem <= 0) { 
                        elTime.innerText = "00:00"; 
                        if (!isBeeping) startBeeping(); 
                    } else { 
                        elTime.innerText = formatTime(-rem);
                        if (isBeeping) stopBeeping();
                    }
                } else {
                    elTime.innerText = formatTime(elapsed, true);
                    if (isBeeping) stopBeeping();
                }
            }
        }

        function updateNextPreview() { elNext.innerHTML = getNextLabel(currentIndex); }

        function getNextLabel(idx) {
            if (idx + 1 < sequence.length) {
                let n = sequence[idx + 1];
                let str = n.type === 'REST' ? `Next: Rest (${formatTime(n.targetTime)})` : 
                          n.type === 'PREP' ? `Next: Prep for ${n.nextInfo}` : 
                          `Next: ${n.title} (Set ${n.set}/${n.totalSets})`;
                
                // Scan ahead for the next different exercise
                let nextEx = null;
                for (let i = idx + 1; i < sequence.length; i++) {
                    if (sequence[i].type === 'EXERCISE') {
                        let currentTitle = (idx >= 0 && sequence[idx].type === 'EXERCISE') ? sequence[idx].title : (n.type === 'EXERCISE' ? n.title : null);
                        if (sequence[i].title !== currentTitle && sequence[i].title !== n.title) {
                            nextEx = sequence[i].title;
                            break;
                        }
                    }
                }

                if (nextEx) {
                    str += `<br><span style="font-size: 0.8em; color: var(--text-muted); display: block; margin-top: 6px;">Later: ${nextEx}</span>`;
                }
                return str;
            }
            return "Finish";
        }

        function advanceStep() {
            initAudio(); stopBeeping();
            if (currentIndex === -1) {
                totalStartTime = Date.now();
                mainInterval = setInterval(updateDisplay, 100);
            } else if (currentIndex < sequence.length) {
                const step = sequence[currentIndex];
                let elapsed = (Date.now() - stepStartTime) / 1000;
                if (step.type === 'EXERCISE' && !step.targetTime) elapsed = Math.max(0, elapsed - SETTINGS.transitionDelay);
                
                // Do not log prep time in final summary
                if (step.type !== 'PREP') {
                    records.push({ type: step.type, title: step.title, set: step.set, duration: elapsed });
                }
            }
            currentIndex++;
            if (currentIndex >= sequence.length) { finishWorkout(); return; }
            
            const step = sequence[currentIndex];
            stepStartTime = Date.now();
            elBtn.className = 'circle-btn ';
            
            if (step.type === 'EXERCISE') {
                elBtn.classList.add('state-ex-' + (step.color || 'default'));
                elTitle.innerText = step.title;
                elSubtitle.innerText = `Set ${step.set} of ${step.totalSets}`;
            } else {
                elBtn.classList.add('state-rest');
                elTitle.innerText = step.type === 'PREP' ? "PREP" : "REST";
                elSubtitle.innerText = `Up Next: ${step.nextInfo}`;
            }
            
            elTime.innerText = step.targetTime ? formatTime(-step.targetTime) : "+00:00";
            updateNextPreview();
        }

        function finishWorkout() {
            if (workoutCompleted) return;
            workoutCompleted = true;
            clearInterval(mainInterval);
            elBtn.className = 'circle-btn state-done';
            elTitle.innerText = "DONE";
            elSubtitle.innerText = "Generating log...";
            elTime.innerText = "";
            setTimeout(showSummary, 1000);
        }

        function showSummary() {
            uiWorkout.style.display = 'none';
            uiSummary.style.display = 'flex';
            const now = new Date();
            const dateStr = now.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
            const startStr = new Date(totalStartTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const totalDur = formatTime((now - totalStartTime) / 1000);

            let txt = `Workout: ${dateStr} @ ${startStr}\nDuration: ${totalDur}\n\n`;
            records.forEach(r => {
                txt += r.type === 'REST' ? `[Rest] ${formatTime(r.duration)}\n` : `${r.title} (S${r.set}): ${formatTime(r.duration)}\n`;
            });
            
            document.getElementById('summary-text').value = txt;
            HISTORY.unshift({ timestamp: Date.now(), date: dateStr + ' ' + startStr, summary: txt });
            saveAll();
        }

        function copyToClipboard(text) {
            const ta = document.createElement('textarea');
            ta.value = text; document.body.appendChild(ta);
            ta.select(); document.execCommand('copy');
            document.body.removeChild(ta);
        }

        window.onload = () => {
            cleanHistory();
            sequence = buildSequence();
            updateNextPreview();
            elBtn.addEventListener('click', advanceStep);
            renderSidebar();
        };
    </script>
</body>
</html>
